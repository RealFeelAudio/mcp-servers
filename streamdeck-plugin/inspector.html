<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Claude Bridge Settings</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; padding: 10px; color: #eee; background: #2d2d2d; }
    label { display: block; margin-bottom: 4px; }
    input { width: 100%; box-sizing: border-box; padding: 4px; background: #444; color: #eee; border: 1px solid #666; border-radius: 3px; }
  </style>
</head>
<body>
  <label for="label">Button Label (shown in event log)</label>
  <input type="text" id="label" placeholder="e.g. Mute Bus 1" />
  <script>
    const websocketSDK = "connectElgatoStreamDeckSocket";
    let sdWs, actionIdentifier, context;

    window[websocketSDK] = function(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      context = inUUID;
      const info = JSON.parse(inActionInfo);
      actionIdentifier = info.action;

      const settings = info.payload?.settings || {};
      document.getElementById("label").value = settings.label || "";

      sdWs = new WebSocket("ws://127.0.0.1:" + inPort);
      sdWs.onopen = () => sdWs.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
    };

    document.getElementById("label").addEventListener("change", function() {
      const settings = { label: this.value };
      sdWs.send(JSON.stringify({ event: "setSettings", context, payload: settings }));
    });
  </script>
</body>
</html>
